name: Reusable CI

on:
  workflow_call:
    secrets:
      PERSONAL_ACCESS_TOKEN:
        required: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      UID: 0
      GID: 0
      GITHUB_TOKEN: ${{ secrets.PERSONAL_ACCESS_TOKEN }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          driver: docker

      - name: Configure Git to use token (composer git deps)
        run: git config --global url."https://${GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Dev-kit init
        run: ./init.sh

      - name: Build and start services
        run: .dev-kit/docker-build.sh
        env:
          DOCKER_BUILDKIT: "1"
          BUILDKIT_PROGRESS: "plain"

      - name: Validate composer.json
        run: .dev-kit/docker-exec.sh composer-validate

      - name: Install Composer dependencies
        run: .dev-kit/docker-exec.sh composer-install

      - name: Run Rector check
        run: .dev-kit/docker-exec.sh rector-check

      - name: Run PHP CS Fixer check
        run: .dev-kit/docker-exec.sh cs-check

      - name: Run PHPStan
        run: .dev-kit/docker-exec.sh phpstan

      - name: Run unit tests
        run: .dev-kit/docker-exec.sh test-unit

      - name: Run integration tests
        run: .dev-kit/docker-exec.sh test-integration

      - name: Enforce 100% test coverage
        run: .dev-kit/docker-exec.sh test-cover-strict

      - name: Cleanup (always)
        if: always()
        run: .dev-kit/docker-down.sh
