name: ${COMPOSE_PROJECT_NAME:-eventur}

services:
  component:
    build:
      context: .
      dockerfile: .dev-kit/docker/Dockerfile
      args:
        PHP_VERSION: ${PHP_VERSION:-8.5}
        UID: ${DEVKIT_UID:-1000}
        GID: ${DEVKIT_GID:-1000}

    user: "${DEVKIT_UID:-1000}:${DEVKIT_GID:-1000}"
    working_dir: /workspace

    tty: true

    env_file:
      - path: ./.dev-kit/docker/.env.base
        required: true
      - path: ./.env
        required: false

    environment:
      PHP_IDE_CONFIG: ${PHP_IDE_CONFIG:-serverName=eventur}

    volumes:
      - ./:/workspace
      - composer-cache:/tmp/composer/cache

    extra_hosts:
      - host.docker.internal:host-gateway

    depends_on:
      mysql:
        condition: service_healthy
        required: false

      postgres:
        condition: service_healthy
        required: false

      mongo:
        condition: service_started
        required: false

    networks:
      - eventur

  mysql:
    profiles: ["mysql", "all"]
    image: mysql:8.4

    ports:
      - "3306"

    command: --defaults-file=/etc/mysql/conf.d/mysql.cnf

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: mysql_db

    volumes:
      - mysql-data:/var/lib/mysql
      - ./.dev-kit/docker/mysql.cnf:/etc/mysql/conf.d/mysql.cnf:ro

    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 2s
      timeout: 5s
      retries: 60
      start_period: 20s

    networks:
      - eventur

  postgres:
    profiles: ["postgres", "all"]
    image: postgres:17

    ports:
      - "5432"

    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: postgres_db

    volumes:
      - postgres-data:/var/lib/postgresql/data

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U root -d postgres_db"]
      interval: 2s
      timeout: 2s
      retries: 30

    networks:
      - eventur

  mongo:
    profiles: ["mongo", "all"]
    image: mongo:8

    ports:
      - "27017"

    command:
      - mongod
      - --replSet
      - rs0
      - --bind_ip_all

    volumes:
      - mongo-data:/data/db

    networks:
      - eventur

  mongo-init:
    profiles: ["mongo", "all"]
    image: mongo:8

    depends_on:
      - mongo

    restart: "no"

    entrypoint:
      - bash
      - -lc
      - |
        sleep 3
        mongosh --host mongo:27017 --eval '
          try {
            rs.status()
          } catch (e) {
            rs.initiate({
              _id: "rs0",
              members: [{ _id: 0, host: "mongo:27017" }]
            })
          }
        '

    networks:
      - eventur

volumes:
  composer-cache:
  mysql-data:
  postgres-data:
  mongo-data:

networks:
  eventur: